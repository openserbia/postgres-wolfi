name: lint

on:
  push:
    branches: [main]
    # paths-ignore on push ONLY. pull_request stays unfiltered so every PR is
    # always linted — keeps `lint` safe to use as a required status check (a
    # path-filtered required check leaves doc-only PRs with no status and blocks
    # the merge). Nothing below can affect shellcheck (test/*.sh) or hadolint
    # (Dockerfile), so doc/meta-only pushes to main skip linting.
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'
      - '.idea/**'
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Linters are run as plain CLIs (shellcheck preinstalled; hadolint pulled by
# pinned release URL) rather than via marketplace tool-wrapper actions — same
# philosophy as build.yml: fewer third-party actions, nothing we don't control.
jobs:
  lint:
    runs-on: ubuntu-latest   # GitHub-hosted — NOT a self-hosted runner
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false

      - name: ShellCheck
        # shellcheck is preinstalled on ubuntu-latest runners.
        # docker-entrypoint.sh is intentionally NOT linted: it is vendored
        # verbatim from docker-library/postgres and must never be hand-edited.
        run: shellcheck test/*.sh

      - name: hadolint
        # Pinned hadolint release binary, run directly against the Dockerfile.
        # TODO: add sha256sum verification of the downloaded binary before relying on this gate
        run: |
          curl -fsSL -o hadolint \
            https://github.com/hadolint/hadolint/releases/download/v2.12.0/hadolint-Linux-x86_64
          chmod +x hadolint
          ./hadolint ./Dockerfile
