name: build

on:
  schedule:
    - cron: "17 6 * * 1"   # weekly, Monday 06:17 UTC
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write      # push to GHCR
  id-token: write      # cosign keyless OIDC

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: false   # don't cancel a partway-pushed run

env:
  IMAGE: ghcr.io/openserbia/postgres-wolfi
  PG_MAJOR: "18"

# Tooling (trivy, syft, cosign, go-task) comes from the repo's devbox.json via
# `devbox run` on the ax41 runner — NOT from marketplace tool-wrapper actions.
# trivy-action was dropped because it internally pins aquasecurity/setup-trivy by
# a tag we don't control, which broke when upstream retagged it. Running the CLIs
# directly is race-proof and cuts four third-party actions.
jobs:
  build:
    runs-on: [self-hosted, ax41]   # bare [self-hosted] lands on rpi -> exit 127
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Compute date tag
        id: meta
        run: echo "date=$(date -u +%Y%m%d)" >> "$GITHUB_OUTPUT"

      - name: Build
        run: |
          docker build \
            -t "$IMAGE:$PG_MAJOR-latest" \
            -t "$IMAGE:$PG_MAJOR-${{ steps.meta.outputs.date }}" \
            .

      - name: Scan (CRITICAL gate) + SBOM + smoke
        run: devbox run -- task scan sbom smoke

      - name: Upload SBOM
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: sbom
          path: sbom.cdx.json
          retention-days: 30

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Push
        run: |
          docker push "$IMAGE:$PG_MAJOR-latest"
          docker push "$IMAGE:$PG_MAJOR-${{ steps.meta.outputs.date }}"

      - name: Sign + attest (by digest, via devbox cosign)
        run: |
          DIGEST=$(docker inspect --format '{{index .RepoDigests 0}}' "$IMAGE:$PG_MAJOR-latest")
          echo "signing $DIGEST"
          devbox run -- cosign sign --yes "$DIGEST"
          devbox run -- cosign attest --yes --type cyclonedx --predicate sbom.cdx.json "$DIGEST"
