name: build

on:
  schedule:
    - cron: "17 6 * * 1"   # weekly, Monday 06:17 UTC
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write      # push to GHCR
  id-token: write      # cosign keyless OIDC

env:
  IMAGE: ghcr.io/openserbia/postgres-wolfi
  PG_MAJOR: "18"

jobs:
  build:
    runs-on: [self-hosted, ax41]   # bare [self-hosted] lands on rpi -> exit 127
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Compute date tag
        id: meta
        run: echo "date=$(date -u +%Y%m%d)" >> "$GITHUB_OUTPUT"

      - name: Build
        run: |
          docker build \
            -t "$IMAGE:$PG_MAJOR-latest" \
            -t "$IMAGE:$PG_MAJOR-${{ steps.meta.outputs.date }}" \
            .

      - name: Trivy — fail on CRITICAL
        uses: aquasecurity/trivy-action@0.28.0   # TODO pin to SHA for Scorecard
        with:
          image-ref: ${{ env.IMAGE }}:${{ env.PG_MAJOR }}-latest
          severity: CRITICAL
          exit-code: "1"

      - name: Trivy — report HIGH (non-gating)
        uses: aquasecurity/trivy-action@0.28.0   # TODO pin to SHA
        with:
          image-ref: ${{ env.IMAGE }}:${{ env.PG_MAJOR }}-latest
          severity: HIGH
          exit-code: "0"

      - name: SBOM (CycloneDX)
        uses: anchore/sbom-action@v0.17.8        # TODO pin to SHA
        with:
          image: ${{ env.IMAGE }}:${{ env.PG_MAJOR }}-latest
          format: cyclonedx-json
          output-file: sbom.cdx.json

      - name: Upload SBOM
        uses: actions/upload-artifact@v4         # TODO pin to SHA
        with:
          name: sbom
          path: sbom.cdx.json
          retention-days: 30

      - name: Smoke test
        run: ./test/smoke.sh "$IMAGE:$PG_MAJOR-latest"

      - name: Log in to GHCR
        uses: docker/login-action@v3             # TODO pin to SHA
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push
        run: |
          docker push "$IMAGE:$PG_MAJOR-latest"
          docker push "$IMAGE:$PG_MAJOR-${{ steps.meta.outputs.date }}"

      - name: Install cosign
        uses: sigstore/cosign-installer@v3.7.0   # TODO pin to SHA

      - name: Sign (keyless) + attest SBOM
        run: |
          cosign sign --yes "$IMAGE:$PG_MAJOR-latest"
          cosign sign --yes "$IMAGE:$PG_MAJOR-${{ steps.meta.outputs.date }}"
          cosign attest --yes --type cyclonedx --predicate sbom.cdx.json "$IMAGE:$PG_MAJOR-latest"
