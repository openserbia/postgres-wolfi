version: 2
updates:
  # GitHub Actions used by the workflows (.github/workflows/*).
  # Keeps the SHA-pins current; PRs land with the "ci" commit prefix.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "ci"
    labels:
      - "dependencies"

  # Base image / build stages referenced in the Dockerfile.
  # PRs land with the "build" commit prefix.
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "build"
    labels:
      - "dependencies"
