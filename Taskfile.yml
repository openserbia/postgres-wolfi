version: '3'

vars:
  IMAGE: ghcr.io/openserbia/postgres-wolfi
  # Default major; override per invocation, e.g. `task ci PG_MAJOR=17`.
  # CI drives one major per matrix leg this way.
  PG_MAJOR: '18'
  DATE:
    sh: date -u +%Y%m%d
  # Image ref that scan/sbom/smoke operate on. Defaults to the locally-built
  # :PG_MAJOR-latest; CI overrides it per arch leg, e.g.
  # `task scan sbom smoke REF=$IMAGE:18-20260607-arm64`.
  REF: '{{.IMAGE}}:{{.PG_MAJOR}}-latest'

tasks:
  build:
    desc: Build the image (:PG_MAJOR-latest and :PG_MAJOR-DATE)
    cmds:
      - docker build --build-arg PG_MAJOR={{.PG_MAJOR}} -t {{.IMAGE}}:{{.PG_MAJOR}}-latest -t {{.IMAGE}}:{{.PG_MAJOR}}-{{.DATE}} .

  scan:
    desc: Trivy — fail on CRITICAL, report HIGH
    cmds:
      - trivy image --exit-code 1 --severity CRITICAL {{.REF}}
      - trivy image --severity HIGH {{.REF}}

  sbom:
    desc: Generate CycloneDX SBOM
    cmds:
      - syft {{.REF}} -o cyclonedx-json=sbom.cdx.json

  smoke:
    desc: Smoke-test the built image (asserts server major == PG_MAJOR)
    cmds:
      - ./test/smoke.sh {{.REF}} {{.PG_MAJOR}}

  ci:
    desc: build -> scan -> sbom -> smoke (no push)
    cmds:
      - task: build
      - task: scan
      - task: sbom
      - task: smoke

  default:
    cmds:
      - task -l
